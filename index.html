<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link href="./style.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full overflow-auto" style="background: #0a0a1a;">
    <!-- Floating orbs -->
   <div class="orb orb-1"></div>
   <div class="orb orb-2"></div>
   <div class="orb orb-3"></div>
   <div class="relative z-10 max-w-5xl mx-auto px-4 py-12">
    <!-- HERO -->
    <header class="text-center mb-12 fade-up">
     <h1 id="heroTitle" class="hero-title mb-3">Music Player</h1>
     <p id="heroSubtitle" class="text-gray-400 text-lg font-light">Feel every beat</p>
    </header>

    <!-- MAIN PLAYER -->
    <section class="glass-strong rounded-3xl p-6 md:p-10 mb-8 fade-up fade-up-d1">
     <div class="flex flex-col md:flex-row items-center gap-8">
      
      <!-- Album Art -->
      <div id="albumArt" class="album-art flex-shrink-0">
       <div class="note">
        🎵
       </div>
      </div>
      
      <!-- Controls -->
      <div class="flex-1 w-full">
       <h2 id="songTitle" class="text-white text-2xl font-bold mb-1">Select a Song</h2>
       <p id="songArtist" class="text-gray-400 text-sm mb-6">—</p>
       <!-- Progress -->
       <div class="mb-4">
        <div id="progressTrack" class="progress-track">
         <div id="progressFill" class="progress-fill" style="width:0%"></div>
        </div>
        <div class="flex justify-between mt-2 text-xs text-gray-500">
          <span id="currentTime">0:00</span> 
          <span id="duration">0:00</span>
        </div>
       </div>
       
       <!-- Buttons -->
       <div class="flex items-center justify-center gap-4 mb-5">
        <button id="shuffleBtn" class="ctrl-btn" title="Shuffle">
          <i data-lucide="shuffle" style="width:18px;height:18px"></i>
        </button> 
        <button id="prevBtn" class="ctrl-btn" title="Previous">
          <i data-lucide="skip-back" style="width:20px;height:20px"></i>
        </button> 
        <button id="playBtn" class="ctrl-btn play-btn" title="Play">
          <i data-lucide="play" style="width:26px;height:26px"></i>
        </button> 
        <button id="nextBtn" class="ctrl-btn" title="Next">
          <i data-lucide="skip-forward" style="width:20px;height:20px"></i>
        </button> 
        <button id="repeatBtn" class="ctrl-btn" title="Repeat">
          <i data-lucide="repeat" style="width:18px;height:18px"></i>
        </button>
       </div>
       <!-- Volume -->
       <div class="flex items-center justify-center gap-3">
        <i data-lucide="volume-2" style="width:18px;height:18px" class="text-gray-400"></i> 
        <input id="volumeSlider" type="range" min="0" max="100" value="80" class="vol-slider">
       </div>
      </div>
     </div>
    </section>
    
    <!-- PLAYLIST -->
    <section class="glass rounded-3xl p-6 mb-8 fade-up fade-up-d2">
     <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-semibold text-lg">Playlist</h3>
      <label id="uploadLabel" class="ctrl-btn" 
        style="width:auto;height:auto;padding:8px 16px;border-radius:8px;font-size : 15px;gap:6px;cursor:pointer"> 
        <i data-lucide="upload" style="width:14px;height:14px"></i> Upload 
        <input id="uploadInput" type="file" accept="audio/*" multiple class="hidden"> 
      </label>
     </div>
     <div id="playlist" class="space-y-2 max-h-72 overflow-auto pr-1"></div>
    </section>
    
    <!-- KEYBOARD HINT -->
    <section class="text-center text-gray-600 text-lg fade-up fade-up-d3 mb-6">
      <span class="glass inline-block px-4 py-2 rounded-lg"> ⌨️ Space = Play/Pause &nbsp;·&nbsp; ← → = Prev/Next &nbsp;·&nbsp; ↑ ↓ = Volume </span>
    </section>
    
    <!-- FOOTER -->
    <footer class="text-center text-gray-600 text-lg pb-8 fade-up fade-up-d3">
     Built with 💜 · Glassmorphism Music Player
    </footer>
   </div>
   
   <!-- TOAST -->
   <div id="toast" class="toast"></div>
  </div>
<script src="./app.js"></script>
</body>
</html>
